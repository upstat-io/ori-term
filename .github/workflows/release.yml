name: Release

on:
  push:
    tags:
      - 'v*'

# Cancel previous runs on the same tag (e.g., if tag is force-pushed)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  ORITERM_CHANNEL: release

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag is on main branch
        run: |
          if ! git merge-base --is-ancestor ${{ github.sha }} origin/main; then
            echo "ERROR: Release tags must be on the main branch."
            echo ""
            echo "The tagged commit (${{ github.sha }}) is not on main."
            echo "Please ensure you're tagging a commit that has been merged to main."
            exit 1
          fi
          echo "Tag is on main branch - OK"

      - name: Extract expected version from tag
        id: tag_version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "tag_version=$TAG_VERSION" >> $GITHUB_OUTPUT
          echo "Tag version: $TAG_VERSION"

      - name: Extract Cargo.toml version
        id: cargo_version
        run: |
          CARGO_VERSION=$(sed -n '/\[workspace\.package\]/,/^\[/{ s/^version[[:space:]]*=[[:space:]]*"\([^"]*\)".*/\1/p }' Cargo.toml)
          echo "cargo_version=$CARGO_VERSION" >> $GITHUB_OUTPUT
          echo "Cargo.toml version: $CARGO_VERSION"

      - name: Validate tag matches Cargo.toml
        run: |
          if [[ "${{ steps.tag_version.outputs.tag_version }}" != "${{ steps.cargo_version.outputs.cargo_version }}" ]]; then
            echo "ERROR: Tag version (${{ steps.tag_version.outputs.tag_version }}) does not match Cargo.toml version (${{ steps.cargo_version.outputs.cargo_version }})"
            echo ""
            echo "To fix:"
            echo "  1. Delete the tag: git tag -d ${{ github.ref_name }} && git push origin :refs/tags/${{ github.ref_name }}"
            echo "  2. Update Cargo.toml version to match"
            echo "  3. Commit, tag, and push again"
            exit 1
          fi
          echo "Version validation passed!"

  build-linux:
    name: Build Linux (x86_64)
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config libx11-dev libxi-dev libxcursor-dev \
            libxrandr-dev libxinerama-dev libwayland-dev \
            libxkbcommon-dev libegl-dev libvulkan-dev

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release

      - name: Strip binaries
        run: |
          strip target/release/oriterm
          strip target/release/oriterm-mux

      - name: Package
        run: |
          cd target/release
          tar -czvf ../../oriterm-${{ github.ref_name }}-linux-x86_64.tar.gz oriterm oriterm-mux
          cd ../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: oriterm-linux-x86_64
          path: oriterm-${{ github.ref_name }}-linux-x86_64.tar.gz

  build-windows:
    name: Build Windows (x86_64)
    needs: validate
    runs-on: windows-2022
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Package
        run: |
          cd target/x86_64-pc-windows-msvc/release
          7z a ../../../oriterm-${{ github.ref_name }}-windows-x86_64.zip oriterm.exe oriterm-mux.exe
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: oriterm-windows-x86_64
          path: oriterm-${{ github.ref_name }}-windows-x86_64.zip

  release:
    name: Create Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: oriterm-linux-x86_64
          path: artifacts

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: oriterm-windows-x86_64
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum oriterm-* > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Determine release type
        id: release_type
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$VERSION" == *"alpha"* ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
            echo "name=oriterm $VERSION (Alpha)" >> $GITHUB_OUTPUT
          elif [[ "$VERSION" == *"beta"* ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
            echo "name=oriterm $VERSION (Beta)" >> $GITHUB_OUTPUT
          elif [[ "$VERSION" == *"rc"* ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
            echo "name=oriterm $VERSION (Release Candidate)" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
            echo "name=oriterm $VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Gather commit log
        id: commits
        run: |
          TAG="${{ github.ref_name }}"
          PREV_TAG=$(git tag --sort=-creatordate | grep -v "^${TAG}$" \
            | grep -E '^v[0-9]' | head -1)

          if [[ -n "$PREV_TAG" ]]; then
            LOG=$(git log "${PREV_TAG}..HEAD" \
              --pretty=format:"- %s (%h)" --no-merges)
          else
            LOG=$(git log --pretty=format:"- %s (%h)" --no-merges -50)
          fi

          echo "$LOG" > /tmp/commit-log.txt

      - name: Generate release notes
        run: |
          LOG=$(cat /tmp/commit-log.txt)
          BODY=""
          FEATURES=""
          FIXES=""
          OTHER=""
          while IFS= read -r line; do
            line=$(echo "$line" | xargs)
            [[ -z "$line" || "$line" != -\ * ]] && continue
            subject="${line:2}"
            if [[ "$subject" == feat* ]]; then
              FEATURES="${FEATURES}${line}\n"
            elif [[ "$subject" == fix* ]]; then
              FIXES="${FIXES}${line}\n"
            else
              OTHER="${OTHER}${line}\n"
            fi
          done <<< "$LOG"
          [[ -n "$FEATURES" ]] && BODY="${BODY}### Features\n\n${FEATURES}\n"
          [[ -n "$FIXES" ]] && BODY="${BODY}### Bug Fixes\n\n${FIXES}\n"
          [[ -n "$OTHER" ]] && BODY="${BODY}### Other\n\n${OTHER}\n"
          [[ -z "$BODY" ]] && BODY="See commit history for changes."
          printf '%b' "$BODY" > /tmp/release-notes.txt
          echo "Release notes generated from commit log"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.release_type.outputs.name }}
          body_path: /tmp/release-notes.txt
          files: |
            artifacts/*
          prerelease: ${{ steps.release_type.outputs.prerelease }}
          make_latest: ${{ steps.release_type.outputs.prerelease != 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
