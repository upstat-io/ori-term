name: Release

on:
  push:
    tags:
      - 'v*'

# Cancel previous runs on the same tag (e.g., if tag is force-pushed)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  ORITERM_CHANNEL: release

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag is on main branch
        run: |
          if ! git merge-base --is-ancestor ${{ github.sha }} origin/main; then
            echo "ERROR: Release tags must be on the main branch."
            echo ""
            echo "The tagged commit (${{ github.sha }}) is not on main."
            echo "Please ensure you're tagging a commit that has been merged to main."
            exit 1
          fi
          echo "Tag is on main branch - OK"

      - name: Check version synchronization
        run: ./scripts/sync-version.sh --check

  build-linux:
    name: Build Linux (x86_64)
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config libx11-dev libxi-dev libxcursor-dev \
            libxrandr-dev libxinerama-dev libwayland-dev \
            libxkbcommon-dev libegl-dev libvulkan-dev

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release

      - name: Strip binaries
        run: |
          strip target/release/oriterm
          strip target/release/oriterm-mux

      - name: Package
        run: |
          cd target/release
          tar -czvf ../../oriterm-${{ github.ref_name }}-linux-x86_64.tar.gz oriterm oriterm-mux
          cd ../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: oriterm-linux-x86_64
          path: oriterm-${{ github.ref_name }}-linux-x86_64.tar.gz

  build-macos:
    name: Build macOS (${{ matrix.arch }})
    needs: validate
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            runner: macos-14
            target: aarch64-apple-darwin
            name: macos-aarch64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binaries
        run: |
          strip target/${{ matrix.target }}/release/oriterm
          strip target/${{ matrix.target }}/release/oriterm-mux

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar -czvf ../../../oriterm-${{ github.ref_name }}-${{ matrix.name }}.tar.gz oriterm oriterm-mux
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: oriterm-${{ matrix.name }}
          path: oriterm-${{ github.ref_name }}-${{ matrix.name }}.tar.gz

  build-windows:
    name: Build Windows (x86_64)
    needs: validate
    runs-on: windows-2022
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Package
        run: |
          cd target/x86_64-pc-windows-msvc/release
          7z a ../../../oriterm-${{ github.ref_name }}-windows-x86_64.zip oriterm.exe oriterm-mux.exe
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: oriterm-windows-x86_64
          path: oriterm-${{ github.ref_name }}-windows-x86_64.zip

  attach-artifacts:
    name: Attach Artifacts to Release
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum oriterm-* > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
