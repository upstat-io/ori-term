name: Nightly Release

# Create a PR from dev → main every night if there are new commits.
# The auto-release workflow tags and releases after merge.
#
# Before creating the PR, merge main → dev to absorb the version-bump
# commit that auto-release pushed after the previous nightly merge.
# This prevents Cargo.lock conflicts on every PR.

on:
  schedule:
    # Every day at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Manual trigger for testing

permissions:
  contents: write
  pull-requests: write

jobs:
  nightly-pr:
    name: Nightly PR
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ORITERM_RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Check for new commits
        id: check
        run: |
          git fetch origin main dev
          AHEAD=$(git rev-list --count origin/main..origin/dev)
          echo "ahead=$AHEAD" >> $GITHUB_OUTPUT
          if [ "$AHEAD" -eq 0 ]; then
            echo "No new commits on dev since last merge. Skipping."
          else
            echo "$AHEAD new commit(s) on dev ahead of main."
          fi

      # Merge main → dev to absorb the version-bump commit from the last
      # auto-release.  Cargo.lock conflicts are expected and resolved by
      # regenerating the lockfile.
      - name: Install Rust (for lockfile regen)
        if: steps.check.outputs.ahead != '0'
        uses: dtolnay/rust-toolchain@stable

      - name: Sync main into dev
        if: steps.check.outputs.ahead != '0'
        id: sync
        run: |
          BEHIND=$(git rev-list --count origin/dev..origin/main)
          if [ "$BEHIND" -eq 0 ]; then
            echo "dev already contains all main commits. No sync needed."
            exit 0
          fi
          echo "$BEHIND commit(s) on main not in dev — merging."

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout dev

          if git merge origin/main --no-edit -m "chore: merge main into dev (nightly sync)"; then
            echo "Clean merge."
          else
            # Only Cargo.lock conflicts are expected from the version bump.
            CONFLICTED=$(git diff --name-only --diff-filter=U)
            if [ "$CONFLICTED" != "Cargo.lock" ]; then
              echo "::error::Unexpected merge conflicts in: $CONFLICTED"
              git merge --abort
              exit 1
            fi
            echo "Cargo.lock conflict — regenerating lockfile."
            git checkout --theirs Cargo.lock
            cargo generate-lockfile
            git add Cargo.lock
            git commit --no-edit -m "chore: merge main into dev (nightly sync)"
          fi

          git push origin dev

          # Re-check ahead count after sync.
          git fetch origin main dev
          AHEAD=$(git rev-list --count origin/main..origin/dev)
          echo "ahead=$AHEAD" >> $GITHUB_OUTPUT
          if [ "$AHEAD" -eq 0 ]; then
            echo "After sync, dev has no new commits beyond main. Skipping PR."
          fi

      - name: Check for existing PR
        if: steps.check.outputs.ahead != '0'
        id: existing
        env:
          GH_TOKEN: ${{ secrets.ORITERM_RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          PR=$(gh pr list --base main --head dev --state open --json number --jq '.[0].number // empty')
          if [ -n "$PR" ]; then
            echo "PR #$PR already open. Skipping."
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create nightly PR
        if: steps.check.outputs.ahead != '0' && steps.existing.outputs.exists == 'false'
        id: create
        env:
          GH_TOKEN: ${{ secrets.ORITERM_RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date -u +"%Y-%m-%d")
          AHEAD=${{ steps.check.outputs.ahead }}

          PR_URL=$(gh pr create \
            --base main \
            --head dev \
            --title "nightly: $DATE" \
            --body "$(cat <<EOF
          ## Nightly Release — $DATE

          Automated PR with $AHEAD new commit(s) from dev.

          This PR will auto-merge once CI passes, triggering a nightly release.
          EOF
          )")
          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT

      - name: Enable auto-merge
        if: steps.check.outputs.ahead != '0' && steps.existing.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.ORITERM_RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge "${{ steps.create.outputs.pr_url }}" --auto --merge --delete-branch=false
