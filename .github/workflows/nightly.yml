name: Nightly

on:
  schedule:
    # Every day at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Manual trigger for testing

concurrency:
  group: nightly
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  ORITERM_CHANNEL: nightly

permissions:
  contents: write

jobs:
  check:
    name: Check for changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for new commits since last nightly
        id: check
        run: |
          # Find the most recent nightly tag
          LAST_NIGHTLY=$(git tag --sort=-creatordate \
            | grep -E '^v.*-nightly\.' | head -1)

          if [[ -n "$LAST_NIGHTLY" ]]; then
            AHEAD=$(git rev-list --count "${LAST_NIGHTLY}..HEAD")
            echo "Last nightly tag: $LAST_NIGHTLY"
            echo "Commits ahead: $AHEAD"
            if [ "$AHEAD" -eq 0 ]; then
              echo "No new commits since last nightly. Skipping."
              echo "has_changes=false" >> $GITHUB_OUTPUT
            else
              echo "$AHEAD new commit(s) since last nightly."
              echo "has_changes=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "No previous nightly tag found. Building."
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

  build-linux:
    name: Build Linux (x86_64)
    needs: [check]
    if: needs.check.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config libx11-dev libxi-dev libxcursor-dev \
            libxrandr-dev libxinerama-dev libwayland-dev \
            libxkbcommon-dev libegl-dev libvulkan-dev
      - uses: Swatinem/rust-cache@v2
        with:
          key: nightly-linux
      - name: Build
        run: cargo build --release
      - name: Strip binaries
        run: |
          strip target/release/oriterm
          strip target/release/oriterm-mux
      - name: Package
        run: |
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          DATE=$(date -u +%Y%m%d)
          tar -czvf oriterm-nightly-${DATE}-${SHORT_SHA}-linux-x86_64.tar.gz \
            -C target/release oriterm oriterm-mux
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: oriterm-nightly-linux-x86_64
          path: oriterm-nightly-*-linux-x86_64.tar.gz

  build-macos:
    name: Build macOS (aarch64)
    needs: [check]
    if: needs.check.outputs.has_changes == 'true'
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: nightly-macos
      - name: Build
        run: cargo build --release
      - name: Strip binaries
        run: |
          strip target/release/oriterm
          strip target/release/oriterm-mux
      - name: Package
        run: |
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          DATE=$(date -u +%Y%m%d)
          tar -czvf oriterm-nightly-${DATE}-${SHORT_SHA}-macos-aarch64.tar.gz \
            -C target/release oriterm oriterm-mux
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: oriterm-nightly-macos-aarch64
          path: oriterm-nightly-*-macos-aarch64.tar.gz

  build-windows:
    name: Build Windows (x86_64)
    needs: [check]
    if: needs.check.outputs.has_changes == 'true'
    runs-on: windows-2022
    timeout-minutes: 30
    # CI builds natively on Windows using MSVC (not the x86_64-pc-windows-gnu
    # cross-compile target used for local dev). MSVC produces better debuginfo
    # and avoids MinGW runtime dependencies.
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
        with:
          key: nightly-windows
      - name: Build
        run: cargo build --release --target x86_64-pc-windows-msvc
      - name: Package
        shell: bash
        run: |
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          DATE=$(date -u +%Y%m%d)
          7z a oriterm-nightly-${DATE}-${SHORT_SHA}-windows-x86_64.zip \
            ./target/x86_64-pc-windows-msvc/release/oriterm.exe \
            ./target/x86_64-pc-windows-msvc/release/oriterm-mux.exe
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: oriterm-nightly-windows-x86_64
          path: oriterm-nightly-*-windows-x86_64.zip

  release:
    name: Publish Nightly
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum oriterm-* > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Compute release metadata
        id: meta
        run: |
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          DATE=$(date -u +%Y%m%d)
          DATE_DISPLAY=$(date -u +%Y-%m-%d)
          CARGO_VERSION=$(sed -n '/\[workspace\.package\]/,/^\[/{ s/^version[[:space:]]*=[[:space:]]*"\([^"]*\)".*/\1/p }' Cargo.toml)
          TAG="v${CARGO_VERSION}-nightly.${DATE}"
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "date=$DATE_DISPLAY" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "name=oriterm ${CARGO_VERSION}-nightly.${DATE}" >> $GITHUB_OUTPUT
          echo "Nightly tag: $TAG"

      - name: Gather commit log
        id: commits
        run: |
          # Find most recent non-nightly tag, or any previous nightly tag.
          PREV_TAG=$(git tag --sort=-creatordate \
            | grep -E '^v[0-9]' | head -1)

          if [[ -n "$PREV_TAG" ]]; then
            LOG=$(git log "${PREV_TAG}..HEAD" \
              --pretty=format:"- %s (%h)" --no-merges)
          else
            LOG=$(git log --pretty=format:"- %s (%h)" --no-merges -20)
          fi

          echo "$LOG" > /tmp/commit-log.txt

      - name: Generate release notes
        run: |
          LOG=$(cat /tmp/commit-log.txt)
          BODY=""
          FEATURES=""
          FIXES=""
          OTHER=""
          while IFS= read -r line; do
            line=$(echo "$line" | xargs)
            [[ -z "$line" || "$line" != -\ * ]] && continue
            subject="${line:2}"
            if [[ "$subject" == feat* ]]; then
              FEATURES="${FEATURES}${line}\n"
            elif [[ "$subject" == fix* ]]; then
              FIXES="${FIXES}${line}\n"
            else
              OTHER="${OTHER}${line}\n"
            fi
          done <<< "$LOG"
          [[ -n "$FEATURES" ]] && BODY="${BODY}### Features\n\n${FEATURES}\n"
          [[ -n "$FIXES" ]] && BODY="${BODY}### Bug Fixes\n\n${FIXES}\n"
          [[ -n "$OTHER" ]] && BODY="${BODY}### Other\n\n${OTHER}\n"
          [[ -z "$BODY" ]] && BODY="See commit history for changes."
          printf '%b' "$BODY" > /tmp/release-notes.txt
          echo "Release notes generated from commit log"

      # If a nightly release already exists for the same day, delete it
      # so we can create a fresh one with the updated tag.
      - name: Clean up same-day nightly
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          if gh release view "$TAG" &>/dev/null; then
            gh release delete "$TAG" --yes --cleanup-tag
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Publish nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          body_path: /tmp/release-notes.txt
          files: artifacts/*
          prerelease: true
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
