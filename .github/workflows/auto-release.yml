name: Auto Release

# Single workflow: version-bump → tag → build (all platforms) → release notes → publish.
# CI is guaranteed to have passed via branch protection (required status check).
#
# REQUIRES: The oriterm-release-bot GitHub App must be a bypass actor in the
# main branch ruleset, so this workflow can push version-bump commits directly.
# Secrets: RELEASE_APP_ID, RELEASE_APP_PRIVATE_KEY (from the GitHub App)
#
# If the GitHub App is not set up, set ORITERM_RELEASE_TOKEN (PAT) instead.

on:
  push:
    branches: [main]

# Queue releases — don't cancel in-progress ones.
concurrency:
  group: auto-release
  cancel-in-progress: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Job 1: Version bump, tag, push, release notes ──────────────────────
  prepare:
    name: Prepare Release
    if: "!startsWith(github.event.head_commit.message, 'chore: release v')"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      skip: ${{ steps.tag.outputs.skip }}
      source_changes: ${{ steps.changes.outputs.source_changes }}

    steps:
      - name: Generate token
        id: token
        run: |
          if [[ -n "${{ secrets.RELEASE_APP_ID }}" && -n "${{ secrets.RELEASE_APP_PRIVATE_KEY }}" ]]; then
            echo "method=app" >> $GITHUB_OUTPUT
          elif [[ -n "${{ secrets.ORITERM_RELEASE_TOKEN }}" ]]; then
            echo "method=pat" >> $GITHUB_OUTPUT
          else
            echo "method=default" >> $GITHUB_OUTPUT
          fi

      - name: Generate App token
        if: steps.token.outputs.method == 'app'
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Resolve token
        id: resolve
        run: |
          if [[ "${{ steps.token.outputs.method }}" == "app" ]]; then
            echo "token=${{ steps.app-token.outputs.token }}" >> $GITHUB_OUTPUT
          elif [[ "${{ steps.token.outputs.method }}" == "pat" ]]; then
            echo "token=${{ secrets.ORITERM_RELEASE_TOKEN }}" >> $GITHUB_OUTPUT
          else
            echo "token=${{ secrets.GITHUB_TOKEN }}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ steps.resolve.outputs.token }}
          fetch-depth: 0
          ref: main

      - name: Derive release tag
        id: tag
        run: |
          ./scripts/bump-build.sh

          BUILD_CONTENT=$(tr -d '[:space:]' < BUILD_NUMBER)
          if [[ -z "$BUILD_CONTENT" ]]; then
            echo "::error::BUILD_NUMBER is empty"
            exit 1
          fi

          TAG="v${BUILD_CONTENT}"

          if git rev-parse "refs/tags/${TAG}" &>/dev/null; then
            echo "::warning::Tag ${TAG} already exists — skipping"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "skip=false" >> $GITHUB_OUTPUT
          echo "Release tag: $TAG"

      - name: Install Rust (for lockfile regen)
        if: steps.tag.outputs.skip != 'true'
        uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        if: steps.tag.outputs.skip != 'true'
        with:
          node-version: '22'

      - uses: actions/setup-python@v5
        if: steps.tag.outputs.skip != 'true'
        with:
          python-version: '3.13'

      - name: Install Copilot CLI + SDK
        if: steps.tag.outputs.skip != 'true'
        run: |
          npm i -g @github/copilot
          pip install 'github-copilot-sdk==0.2.0'

      - name: Sync versions and commit
        if: steps.tag.outputs.skip != 'true'
        run: |
          ./scripts/sync-version.sh
          cargo generate-lockfile

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add BUILD_NUMBER Cargo.toml Cargo.lock
          if git diff --cached --quiet; then
            echo "Versions already in sync — no commit needed"
          else
            git commit -m "chore: release ${{ steps.tag.outputs.tag }}"
          fi

      - name: Detect source changes
        if: steps.tag.outputs.skip != 'true'
        id: changes
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | grep '^v' | head -1)

          if [[ -z "$PREV_TAG" ]]; then
            echo "source_changes=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          if git diff --name-only "$PREV_TAG"..HEAD \
              | grep -qE '^(oriterm.*\.(rs|wgsl)|crates/.*\.rs|Cargo\.lock$)'; then
            echo "Source changes detected"
            echo "source_changes=true" >> $GITHUB_OUTPUT
          else
            echo "Housekeeping only — no binaries"
            echo "source_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Push version commit and tag
        if: steps.tag.outputs.skip != 'true'
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          git tag "$TAG"
          git push origin main "$TAG"

      - name: Generate release notes
        if: steps.tag.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ steps.resolve.outputs.token }}
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          python3 scripts/generate-release-notes.py \
            --tag "${{ steps.tag.outputs.tag }}" \
            -o /tmp/release-notes.txt

      - name: Create release (placeholder — binaries attached later)
        if: steps.tag.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ steps.resolve.outputs.token }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          gh release create "$TAG" \
            --title "oriterm ${TAG#v}" \
            --notes-file /tmp/release-notes.txt \
            --prerelease

  # ── Job 2: Build Linux ─────────────────────────────────────────────────
  build-linux:
    name: Build Linux (x86_64)
    needs: prepare
    if: needs.prepare.outputs.skip != 'true' && needs.prepare.outputs.source_changes == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config libx11-dev libxi-dev libxcursor-dev \
            libxrandr-dev libxinerama-dev libwayland-dev \
            libxkbcommon-dev libegl-dev libvulkan-dev

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-linux

      - name: Build
        run: cargo build --release

      - name: Strip and package
        run: |
          strip target/release/oriterm target/release/oriterm-mux
          tar -czvf oriterm-${RELEASE_TAG}-linux-x86_64.tar.gz \
            -C target/release oriterm oriterm-mux

      - uses: actions/upload-artifact@v4
        with:
          name: oriterm-linux-x86_64
          path: oriterm-${{ env.RELEASE_TAG }}-linux-x86_64.tar.gz

  # ── Job 3: Build macOS ─────────────────────────────────────────────────
  build-macos:
    name: Build macOS (aarch64)
    needs: prepare
    if: needs.prepare.outputs.skip != 'true' && needs.prepare.outputs.source_changes == 'true'
    runs-on: macos-14
    timeout-minutes: 20
    env:
      RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-macos

      - name: Build
        run: cargo build --release --target aarch64-apple-darwin

      - name: Strip and package
        run: |
          strip target/aarch64-apple-darwin/release/oriterm \
                target/aarch64-apple-darwin/release/oriterm-mux
          tar -czvf oriterm-${RELEASE_TAG}-macos-aarch64.tar.gz \
            -C target/aarch64-apple-darwin/release oriterm oriterm-mux

      - uses: actions/upload-artifact@v4
        with:
          name: oriterm-macos-aarch64
          path: oriterm-${{ env.RELEASE_TAG }}-macos-aarch64.tar.gz

  # ── Job 4: Build Windows ───────────────────────────────────────────────
  build-windows:
    name: Build Windows (x86_64)
    needs: prepare
    if: needs.prepare.outputs.skip != 'true' && needs.prepare.outputs.source_changes == 'true'
    runs-on: windows-2022
    timeout-minutes: 30
    env:
      RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-windows

      - name: Build
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Package
        shell: bash
        run: |
          7z a oriterm-${RELEASE_TAG}-windows-x86_64.zip \
            ./target/x86_64-pc-windows-msvc/release/oriterm.exe \
            ./target/x86_64-pc-windows-msvc/release/oriterm-mux.exe

      - uses: actions/upload-artifact@v4
        with:
          name: oriterm-windows-x86_64
          path: oriterm-${{ env.RELEASE_TAG }}-windows-x86_64.zip

  # ── Job 5: Attach binaries + checksums to release ──────────────────────
  publish:
    name: Publish Binaries
    needs: [prepare, build-linux, build-macos, build-windows]
    if: needs.prepare.outputs.skip != 'true' && needs.prepare.outputs.source_changes == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum oriterm-* > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Attach to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$RELEASE_TAG" artifacts/* \
            --repo "${{ github.repository }}"
